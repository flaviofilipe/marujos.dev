name: Deploy to AWS S3

on:
  push:
    branches:
      - main  # Altere para a branch principal do seu projeto

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1 # Altere para a sua região

    - name: Deploy to S3
      run: |
        # Apenas arquivos públicos do site; nunca .env, .git ou metadados do repositório
        aws s3 sync . s3://marujos.dev --delete \
          --exclude "*" \
          --include "index.html" \
          --include "img/*" \
          --include "docs/*"

    - name: Invalidar cache do CloudFront
      run: |
        aws cloudfront create-invalidation \
          --distribution-id E3USRZR1Z2T41Z \
          --paths "/*"
